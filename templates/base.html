<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}CheckSkin{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#eef1f5;color:#333;min-height:100vh;display:flex;flex-direction:column}
a{color:#2980b9;text-decoration:none}
a:hover{text-decoration:underline}

nav{background:#2c3e50;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
nav .brand{color:#fff;font-weight:bold;font-size:1.1em;text-decoration:none}
nav .links a{color:#bdc3c7;text-decoration:none;margin-left:14px;font-size:.92em}
nav .links a:hover{color:#fff}

.wrap{max-width:880px;margin:20px auto;padding:0 14px;flex:1}
footer{text-align:center;padding:14px;color:#aaa;font-size:.82em;border-top:1px solid #ddd;margin-top:20px}

.card{background:#fff;border:1px solid #d5d8dc;border-radius:8px;padding:18px;margin-bottom:18px}
.card h2,.card h3{margin-bottom:10px}

.btn{display:inline-block;padding:8px 18px;border:none;border-radius:5px;cursor:pointer;font-size:.9em;text-decoration:none;text-align:center}
.btn-blue{background:#3498db;color:#fff}.btn-blue:hover{background:#2980b9;text-decoration:none}
.btn-gray{background:#7f8c8d;color:#fff}.btn-gray:hover{background:#636e72;text-decoration:none}
.btn-green{background:#27ae60;color:#fff}.btn-green:hover{background:#1e8449;text-decoration:none}
.btn-red{background:#c0392b;color:#fff}.btn-red:hover{background:#a93226;text-decoration:none}
.btn-outline{background:#fff;border:1px solid #3498db;color:#3498db}.btn-outline:hover{background:#ebf5fb;text-decoration:none}
.btn-sm{padding:5px 12px;font-size:.84em}

.alert-err{background:#fdedec;border:1px solid #e74c3c;color:#922b21;padding:10px;border-radius:5px;margin-bottom:12px}
.alert-ok{background:#d5f5e3;border:1px solid #27ae60;color:#1e8449;padding:10px;border-radius:5px;margin-bottom:12px}

{% block extra_css %}{% endblock %}
</style>
</head>
<body>

{% block nav_block %}
<nav>
    <a href="{{ url_for('dashboard') }}" class="brand">CheckSkin</a>
    <div class="links">
        <a href="{{ url_for('dashboard') }}">Главная</a>
        <a href="{{ url_for('upload') }}">Анализ</a>
        <a href="{{ url_for('help_page') }}">Справка</a>
        <a href="{{ url_for('photo_guide') }}">Фото</a>
        <a href="{{ url_for('admin_login') }}">Админ</a>
    </div>
</nav>
{% endblock %}

<div class="wrap">
{% block content %}{% endblock %}
</div>

<footer>&copy; 2026 CheckSkin — Не является медицинским сервисом</footer>
</body>
</html>
